# Maps environment variables to the properties the config beans read.
# The run target (Nx / Make / Maven) sets these env vars.

app_base_url=${APP_BASE_URL}

db_url=${ACCEPTANCE_DB_URL}
db_username=${ACCEPTANCE_DB_USERNAME}
db_password=${ACCEPTANCE_DB_PASSWORD}

# Defaults to headless when the env var is absent.
playwright.headless=${PLAYWRIGHT_HEADLESS:true}

