# Application base URLs (the running application under test)
app.base-url.ui=http://localhost:4200
app.base-url.api=http://localhost:8080

# Database connection for seed/cleanup scripts.
# Matches docker-compose.yml and the backend's local/dev profile (POSTGRES_PASSWORD=admin).
spring.datasource.url=jdbc:postgresql://localhost:5432/staff_engagement
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# Playwright settings
playwright.headless=true
playwright.timeout=30000
