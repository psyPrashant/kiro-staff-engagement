services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: staff_engagement
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d staff_engagement"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./staff-engagement-backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: database
      DB_PORT: "5432"
      DB_NAME: staff_engagement
      DB_USERNAME: postgres
      DB_PASSWORD: admin
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  frontend:
    build:
      context: ./staff-engagement-frontend
      dockerfile: Dockerfile
    ports:
      - "4200:8080"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
