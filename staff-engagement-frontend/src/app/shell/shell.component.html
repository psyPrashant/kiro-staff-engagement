<div class="shell-layout" data-testid="app-shell">
  <aside class="sidebar" data-testid="app-nav">
    <div class="sidebar-brand">
      <div class="brand-icon">SE</div>
      <span class="brand-text">Staff Engagement</span>
    </div>

    <nav class="nav-links">
      <a routerLink="/dashboard" routerLinkActive="active" data-testid="nav-link-dashboard">
        <span class="nav-icon">&#9632;</span>
        Dashboard
      </a>
      <a routerLink="/employee" routerLinkActive="active" data-testid="nav-link-employee">
        <span class="nav-icon">&#9679;</span>
        Employees
      </a>
      <a routerLink="/task" routerLinkActive="active" data-testid="nav-link-task">
        <span class="nav-icon">&#10003;</span>
        Tasks
      </a>
      <a routerLink="/settings" routerLinkActive="active" data-testid="nav-link-settings">
        <span class="nav-icon">&#9881;</span>
        Settings
      </a>
    </nav>

    <div class="sidebar-footer">
      <button (click)="logout()" class="btn-logout" data-testid="logout-button">
        <span class="nav-icon">&#10140;</span>
        Logout
      </button>
    </div>
  </aside>

  <main class="app-content">
    <router-outlet />
  </main>
</div>
